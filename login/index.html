<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Capital University - Student Ticketing Portal</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
  <div class="background">
    <div class="background-image"></div>
    <div class="background-overlay"></div>
  </div>

  <main class="login-wrapper">
    <div class="login-card">
      <div class="card-header">
        <div class="logo">
          <img src="imgs/image (5).png" alt="Capital University" class="logo-img" />
        </div>
        <h1 class="university-name">Capital University</h1>
        <p class="portal-title">Student Ticketing Portal</p>
      </div>

      <form class="login-form">
        <div class="input-group">
          <i class="fas fa-user input-icon"></i>
          <input type="text" id="studentId" placeholder="Student ID" autocomplete="username" />
        </div>
        <div class="input-group">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" id="password" placeholder="Password" autocomplete="current-password" />
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" name="remember" />
            <span>Remember me</span>
          </label>
          <a href="forgettenpassword/index.html" class="forgot-link">Forgot Password?</a>
        </div>

        <button type="submit" class="sign-in-btn">
          Sign In
          <i class="fas fa-arrow-right"></i>
        </button>

        <p style="text-align: center; margin-top: 14px;">
          <a href="../administrator/index.html" class="forgot-link">Admin Dashboard</a>
        </p>
      </form>
    </div>
  </main>

  <footer class="page-footer">
    © 2026 Capital University. All rights reserved.
  </footer>
  <script src="../api.config.js"></script>
  <script src="../api.js"></script>
  <script src="script.js"></script>
  
</body>
</html>
