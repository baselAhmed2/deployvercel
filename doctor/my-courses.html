<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Courses - TICKET LEAD</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-left">
      <button type="button" class="sidebar-toggle" aria-label="Open menu">
        <i class="fas fa-bars"></i>
      </button>
      <span class="brand">TICKET LEAD</span>
      <span class="welcome-text">Welcome!</span>
    </div>
    <div class="header-right">
      <img src="https://ui-avatars.com/api/?name=Alex+Robert&background=6f42c1&color=fff" alt="" class="user-avatar" />
      <span class="user-name">Alex Robert</span>
      <button type="button" class="user-menu-btn" aria-label="User menu">
        <i class="fas fa-chevron-down"></i>
      </button>
    </div>
  </header>

  <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>

  <div class="app-body">
    <aside class="sidebar" id="sidebar" aria-hidden="true">
      <div class="sidebar-header">
        <span class="brand">TICKET LEAD</span>
        <button type="button" class="sidebar-close" aria-label="Close menu">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <nav>
        <ul class="nav-list">
          <li class="nav-item">
            <a href="index.html" class="nav-link">
              <i class="fas fa-th-large"></i>
              Dashboard
            </a>
          </li>
          <li class="nav-item">
            <a href="my-courses.html" class="nav-link active">
              <i class="fas fa-book"></i>
              My Courses
            </a>
          </li>
          <li class="nav-item">
            <a href="tickets.html" class="nav-link">
              <i class="fas fa-ticket-alt"></i>
              Tickets
            </a>
          </li>
          <li class="nav-item">
            <a href="../login/index.html" class="nav-link">
              <i class="fas fa-sign-out-alt"></i>
              Logout
            </a>
          </li>
        </ul>
      </nav>
    </aside>

    <div class="app-layout">
      <main class="main-content">
        <h1 class="page-title">My Courses</h1>
        <div class="courses-grid">
          <a href="tickets.html?course=accounting" class="course-card">
            <span class="course-card-title">Accounting</span>
            <span class="course-card-illus" aria-hidden="true"><i class="fas fa-book"></i></span>
          </a>
          <a href="tickets.html?course=accounting2" class="course-card">
            <span class="course-card-title">Accounting 2</span>
            <span class="course-card-illus" aria-hidden="true"><i class="fas fa-book"></i></span>
          </a>
          <a href="tickets.html?course=accounting3" class="course-card">
            <span class="course-card-title">Accounting 3</span>
            <span class="course-card-illus" aria-hidden="true"><i class="fas fa-book"></i></span>
          </a>
        </div>
      </main>
    </div>
  </div>

  <script src="../api.config.js"></script>
  <script src="../api.js"></script>
  <script src="script.js"></script>
</body>
</html>
