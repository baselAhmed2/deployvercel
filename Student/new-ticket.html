<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Ticket - TICKET LEAD</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-left">
      <button type="button" class="sidebar-toggle" aria-label="Open menu">
        <i class="fas fa-bars"></i>
      </button>
      <span class="brand">TICKET LEAD</span>
      <span class="welcome-text">Welcome! John Smith</span>
    </div>
    <div class="header-right">
      <img src="https://ui-avatars.com/api/?name=Alex+Robert&background=6f42c1&color=fff" alt="" class="user-avatar" />
      <span class="user-name">Alex Robert</span>
      <button type="button" class="user-menu-btn" aria-label="User menu">
        <i class="fas fa-chevron-down"></i>
      </button>
    </div>
  </header>

  <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>

  <div class="app-body">
    <aside class="sidebar" id="sidebar" aria-hidden="true">
      <div class="sidebar-header">
        <span class="brand">TICKET LEAD</span>
        <button type="button" class="sidebar-close" aria-label="Close menu">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <nav>
        <ul class="nav-list">
          <li class="nav-item">
            <a href="index.html" class="nav-link">
              <i class="fas fa-th-large"></i>
              Dashboard
            </a>
          </li>
          <li class="nav-item">
            <a href="new-ticket.html" class="nav-link active">
              <i class="fas fa-ticket-alt"></i>
              New Ticket
            </a>
          </li>
          <li class="nav-item">
            <a href="../login/index.html" class="nav-link">
              <i class="fas fa-sign-out-alt"></i>
              Logout
            </a>
          </li>
        </ul>
      </nav>
    </aside>

    <div class="app-layout">
    <main class="main-content">
      <h1 class="page-title">New Ticket</h1>

      <section class="form-section">
        <h2 class="section-title">Create Quick Ticket</h2>
        <p class="section-desc">Write and address new queries and issues</p>

        <form id="new-ticket-form">
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">Choose Level <span class="required">*</span></label>
              <select class="form-select" name="level" required>
                <option value="">Select Level</option>
                <option value="1">Level 1</option>
                <option value="2">Level 2</option>
                <option value="3">Level 3</option>
                <option value="4" selected>Level 4</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Choose Semester <span class="required">*</span></label>
              <select class="form-select" name="semester" required>
                <option value="">Select Semester</option>
                <option value="1" selected>Semester 1</option>
                <option value="2">Semester 2</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Choose Subject <span class="required">*</span></label>
              <select class="form-select" name="subject" required>
                <option value="">Select Status</option>
                <option value="01">01 - Section Internet Application</option>
                <option value="02">02 - Internet Application</option>
                <option value="05">05 - Section Information System</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Select Doctor <span class="required">*</span></label>
              <select class="form-select" name="doctor" required>
                <option value="">Choose Doctor</option>
                <option value="1">Dr. Mohamed Ahmed</option>
                <option value="2">Dr. John Snow</option>
              </select>
            </div>
            <div class="form-group full-width">
              <label class="form-label">Request Ticket Subject <span class="required">*</span></label>
              <input type="text" class="form-input" name="subject_text" placeholder="Enter Ticket Subject" required />
            </div>
            <div class="form-group full-width">
              <label class="form-label">Ticket Body <span class="required">*</span></label>
              <textarea class="form-textarea" name="body" placeholder="Type ticket issue here.." required></textarea>
            </div>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn-primary">
              <i class="fas fa-paper-plane"></i>
              Send Ticket
            </button>
          </div>
        </form>
      </section>
    </main>
    </div>
  </div>

  <script src="../api.config.js"></script>
  <script src="../api.js"></script>
  <script src="script.js"></script>
</body>
</html>
